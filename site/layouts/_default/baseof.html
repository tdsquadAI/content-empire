<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Google AdSense — uncomment and add your publisher ID when approved -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ .Site.BaseURL }}" class="logo">⚡ Content Empire</a>
            <div class="nav-links">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL | absURL }}">{{ .Name }}</a>
                {{ end }}
            </div>
        </div>
    </nav>
    <!-- Google AdSense Header Banner -->
    <div class="ad-slot ad-header" style="text-align:center;padding:10px 0;background:#f8f9fa;border-bottom:1px solid #eee;">
      <!-- TODO: Replace with AdSense ad unit code after approval -->
      <!-- <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX"></ins> -->
      <div style="width:728px;max-width:100%;height:90px;margin:0 auto;background:#eee;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;font-family:system-ui;">
        📢 Header Ad — Replace with AdSense code
      </div>
    </div>
    <div class="content-with-sidebar" style="display:flex;max-width:1200px;margin:0 auto;gap:24px;padding:0 16px;">
      <main class="container" style="flex:1;min-width:0;">
        {{ block "main" . }}{{ end }}
        <!-- In-Article Ad (after content) -->
        <div class="ad-slot ad-in-article" style="text-align:center;padding:20px 0;margin:30px 0;">
          <!-- TODO: Replace with AdSense in-article ad unit -->
          <!-- <ins class="adsbygoogle" style="display:block;text-align:center" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX"></ins> -->
          <div style="width:100%;max-width:336px;height:280px;margin:0 auto;background:#f5f5f5;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;font-family:system-ui;">
            📢 In-Article Ad — Replace with AdSense code
          </div>
        </div>
      </main>
      <aside class="ad-sidebar" style="width:300px;flex-shrink:0;">
        <!-- Sidebar Ad -->
        <div class="ad-slot ad-sidebar-sticky" style="position:sticky;top:20px;text-align:center;">
          <!-- TODO: Replace with AdSense sidebar ad unit -->
          <!-- <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX"></ins> -->
          <div style="width:300px;height:250px;background:#f5f5f5;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;font-family:system-ui;">
            📢 Sidebar Ad — Replace with AdSense code
          </div>
        </div>
      </aside>
    </div>
    <footer class="footer">
        <div class="container">
            <p>&copy; {{ now.Year }} Content Empire. Build. Publish. Dominate.</p>
        </div>
    </footer>
</body>
</html>
